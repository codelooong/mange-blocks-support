<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>满格方块支持</title>
    <style>
      :root { color-scheme: light; --paper: #faf8f5; --ink: #171717; --muted: #5f5b54; --blue: #3a86ff; --yellow: #f4d35e; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--paper); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.75; }
      main { width: min(920px, calc(100% - 36px)); margin: 0 auto; padding: 56px 0 72px; }
      .eyebrow { display: inline-block; padding: 8px 14px; border: 3px solid var(--ink); background: var(--yellow); font-size: 14px; font-weight: 900; }
      h1 { margin: 22px 0 8px; font-size: clamp(34px, 8vw, 64px); line-height: 1.08; letter-spacing: 0; }
      h2 { margin: 38px 0 10px; padding-top: 20px; border-top: 4px solid var(--ink); font-size: 24px; }
      p, li { font-size: 17px; }
      .lead { max-width: 760px; color: var(--muted); font-size: 19px; font-weight: 700; }
      .note { margin-top: 36px; padding: 18px 20px; border: 3px solid var(--ink); background: #fff; box-shadow: 6px 6px 0 var(--blue); }
      a { color: #1456b8; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Support</div>
      <h1>满格方块支持</h1>
      <p class="lead">感谢你玩满格方块。下面是常见问题和故障排查方法。</p>

      <h2>常见问题</h2>
      <ul>
        <li>游戏进度、成就和每日挑战记录保存在当前设备本地。</li>
        <li>满格方块为一次买断，不包含广告或应用内购买。</li>
        <li>如果游戏画面或操作异常，请先完全退出游戏，再重新打开。</li>
        <li>如问题仍然存在，请重新启动设备，并确认系统已更新至可用的新版本。</li>
      </ul>

      <h2>联系我们</h2>
      <p>需要帮助时，请通过 App Store 页面中的“App 支持”联系开发者，并尽量说明设备型号、iOS 版本和遇到问题的关卡。</p>

      <h2>隐私</h2>
      <p><a href="privacy.html">查看满格方块隐私政策</a></p>

      <div class="note">我们会持续改进游戏体验，并认真处理影响游玩的故障。</div>
    </main>
  </body>
</html>
